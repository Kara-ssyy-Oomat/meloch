  <script>
    // Запоминаем изначальный URL при загрузке
    const initialUrl = window.location.href;
    
    // Закрыть все модальные окна (вызывается при нажатии "Профиль" в нижнем меню)
    function closeAllModals() {
      document.querySelectorAll('.modal-window').forEach(function(el) {
        el.style.display = 'none';
      });
    }
    
    // Слушаем сообщения от родительского окна
    window.addEventListener('message', function(e) {
      if (e.data === 'resetProfile') {
        closeAllModals();
        window.scrollTo(0, 0);
      }
      if (e.data === 'refreshProfile') {
        // Перечитываем данные из localStorage (могли обновиться после заказа)
        closeAllModals();
        window.scrollTo(0, 0);
        if (typeof init === 'function') {
          init();
        }
      }
      if (e.data === 'refreshCart') {
        // обновляем бейдж корзины если нужно
        if (typeof updateCartBadge === 'function') updateCartBadge();
      }
    });
    
    // Закрытие iframe или возврат назад
    function goBack() {
      // Если мы в iframe и это начальная страница - закрываем iframe
      if (window.parent !== window && window.location.href === initialUrl) {
        window.parent.postMessage('closeIframe', '*');
      } else if (window.parent !== window) {
        // Внутри iframe но навигация была - возвращаемся на начальную
        window.location.href = initialUrl;
      } else {
        window.location.href = 'index.html';
      }
    }
    
    // Быстрое открытие страницы через iframe родителя (без перезагрузки)
    function openInFrame(url) {
      if (window.parent !== window && typeof window.parent.openPageInFrame === 'function') {
        // Используем функцию родителя для моментального открытия
        window.parent.openPageInFrame(url);
      } else {
        // Fallback - обычный переход
        window.location.href = url;
      }
    }
    
    // Переход на полную страницу (admin/agent) — открывает в родительском окне
    function navigateTop(url) {
      if (window.parent !== window) {
        window.top.location.href = url;
      } else {
        window.location.href = url;
      }
    }
  </script>

    // Применить сохранённые значения бейджей к DOM
    function applyBadgeCounts() {
      const ob = document.getElementById('ordersUnreadBadge');
      if (ob) {
        ob.textContent = _badgeCounts.orders;
        ob.style.display = _badgeCounts.orders > 0 ? 'inline' : 'none';
      }
      const cb = document.getElementById('chatUnreadBadge');
      if (cb) {
        cb.textContent = _badgeCounts.chat;
        cb.style.display = _badgeCounts.chat > 0 ? 'inline' : 'none';
      }
    }

    // Подписка на новые заказы (pending) для badge
    function subscribeToNewOrders() {
      if (_unsubOrders) return; // уже подписан
      _unsubOrders = db.collection('orders')
        .where('status', '==', 'pending')
        .onSnapshot(snapshot => {
          _badgeCounts.orders = snapshot.size;
          applyBadgeCounts();
        }, error => {
          console.log('Ошибка подписки на заказы:', error.message);
        });
    }

    // Подписка на непрочитанные сообщения для badge
    function subscribeToUnreadChatMessages() {
      if (_unsubChat) return; // уже подписан
      
      _unsubChat = db.collection('chatClients')
        .where('hasUnread', '==', true)
        .onSnapshot(snapshot => {
          _badgeCounts.chat = snapshot.size;
          applyBadgeCounts();
        }, error => {
          console.log('Ошибка подписки на чат:', error.message);
        });
    }
    
    // Вспомогательная: сохранить профиль во все хранилища
    function _saveProfileData() {
      if (!currentCustomer) return;
      try { localStorage.setItem('customerData', JSON.stringify(currentCustomer)); } catch(e) {}
      if (window.PersistProfile) window.PersistProfile.save(currentCustomer);
    }

    // Восстановить профиль из Firestore по телефону (если localStorage очищен)
    async function _restoreProfileFromCloud(cookieData) {
      if (!cookieData || !cookieData.phone) return null;
      if (typeof db === 'undefined' || !db) return null;

      try {
        const normalizedPhone = normalizePhone(cookieData.phone);
        const snapshot = await db.collection('customers')
          .where('phone', '==', normalizedPhone)
          .limit(1)
          .get();

        if (snapshot.empty) return null;

        const doc = snapshot.docs[0];
        const data = doc.data() || {};

        // Если имя есть в cookie и не совпадает с базой, не восстанавливаем
        const cookieName = (cookieData.name || '').trim().toLowerCase();
        const dbName = (data.name || '').trim().toLowerCase();
        if (cookieName && dbName && cookieName !== dbName) return null;

        return {
          id: doc.id,
          name: data.name || cookieData.name || '',
          phone: data.phone || normalizedPhone,
          address: data.address || '',
          createdAt: data.createdAt,
          ordersCount: data.ordersCount || 0,
          totalSpent: data.totalSpent || 0,
          isAdmin: !!data.isAdmin
        };
      } catch (error) {
        console.error('[Profile] Ошибка восстановления из Firestore:', error);
        return null;
      }
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    async function init() {
      // Используем PersistProfile для надёжного восстановления (localStorage → IndexedDB → cookie)
      async function _onProfileLoaded(data) {
        if (data && data.phone) {
          try {
            if (data._restoredFromCookie) {
              const cloudData = await _restoreProfileFromCloud(data);
              if (cloudData) {
                currentCustomer = cloudData;
                _saveProfileData();
              } else {
                currentCustomer = data;
                delete currentCustomer._restoredFromCookie;
                console.log('[Profile] ⚠️ Восстановлено из cookie-бэкапа');
              }
            } else {
              currentCustomer = data;
            }
            
            // Проверяем, является ли клиент админом
            const normalizedPhone = normalizePhone(currentCustomer.phone);
            const adminPhone = normalizePhone(ADMIN_CUSTOMER_DATA.phone);
            
            if (normalizedPhone === adminPhone || currentCustomer.isAdmin) {
              isAdmin = true;
              currentCustomer.isAdmin = true;
              _saveProfileData();
            }
            
            // Быстро восстанавливаем isAgent из кэша
            const cachedAgent = sessionStorage.getItem('isAgent_' + normalizedPhone);
            if (cachedAgent === 'true') {
              isAgent = true;
            }

            // Фолбэк: если агент уже авторизован в localStorage и телефон совпадает
            try {
              const agentRaw = localStorage.getItem('currentAgent');
              if (agentRaw) {
                const agent = JSON.parse(agentRaw);
                const agentPhone = normalizePhone(agent && agent.phone);
                if (agentPhone && agentPhone === normalizedPhone) {
                  isAgent = true;
                  sessionStorage.setItem('isAgent_' + normalizedPhone, 'true');
                }
              }
            } catch (e) {
              console.log('Ошибка чтения currentAgent:', e);
            }
            
            // Сначала показываем кэшированный dashboard мгновенно
            const cachedDashboard = sessionStorage.getItem('dashboardCache_' + normalizedPhone);
            if (cachedDashboard) {
              try {
                _dashboardCache = JSON.parse(cachedDashboard);
                _customerOrders = _dashboardCache.orders || [];
                renderDashboard(_dashboardCache.stats || { ordersCount: 0, totalSpent: 0 }, _dashboardCache.orders || []);
              } catch (e) {
                console.log('Ошибка чтения кэша dashboard');
              }
            }
            
            // Параллельно обновляем данные в фоне
            checkAgentStatus(normalizedPhone);
            loadDashboard();
            
            // Подписка на непрочитанные сообщения для админа
            if (isAdmin) {
              subscribeToUnreadChatMessages();
              subscribeToNewOrders();
            }
          } catch(e) {
            console.error('Ошибка загрузки данных:', e);
            // НЕ удаляем профиль при ошибках сети/Firebase!
            // Показываем dashboard с кэшированными данными если есть
            if (currentCustomer && currentCustomer.name) {
              console.log('[Profile] Ошибка загрузки, показываем профиль с кэшем');
              renderDashboard({ ordersCount: 0, totalSpent: 0 }, []);
            } else {
              // Только если данных совсем нет — показываем форму входа
              showLoginForm();
            }
          }
        } else {
          showLoginForm();
        }
        updateCartBadge();
        _fillComplaintForms();
      }
      
      if (window.PersistProfile) {
        window.PersistProfile.load(_onProfileLoaded);
      } else {
        // Fallback
        const saved = localStorage.getItem('customerData');
        if (saved) {
          try { _onProfileLoaded(JSON.parse(saved)); } catch(e) { showLoginForm(); updateCartBadge(); }
        } else {
          showLoginForm();
          updateCartBadge();
        }
      }
    }
    
    function _fillComplaintForms() {
      // Автозаполнение форм жалобы/предложения
      if (currentCustomer) {
        const complaintName = document.getElementById('complaintName');
        const complaintPhone = document.getElementById('complaintPhone');
        const suggestionName = document.getElementById('suggestionName');
        const suggestionPhone = document.getElementById('suggestionPhone');
        
        if (complaintName) complaintName.value = currentCustomer.name || '';
        if (complaintPhone) complaintPhone.value = currentCustomer.phone || '';
        if (suggestionName) suggestionName.value = currentCustomer.name || '';
        if (suggestionPhone) suggestionPhone.value = currentCustomer.phone || '';
      }
    }
    
    // Проверка статуса агента в фоне
    async function checkAgentStatus(normalizedPhone) {
      try {
        const agentsSnap = await db.collection('agents').get();
        let foundAgent = false;
        agentsSnap.forEach(doc => {
          const agentData = doc.data();
          const agentPhone = normalizePhone(agentData.phone || doc.id);
          if (agentPhone === normalizedPhone) {
            foundAgent = true;
          }
        });
        
        if (foundAgent !== isAgent) {
          isAgent = foundAgent;
          // Обновить UI если статус изменился
          if (_dashboardCache) {
            renderDashboard(_dashboardCache.stats, _dashboardCache.orders);
          }
        }
        
        // Сохраняем в кэш
        sessionStorage.setItem('isAgent_' + normalizedPhone, foundAgent ? 'true' : 'false');
      } catch (e) {
        console.log('Ошибка проверки агента:', e);
      }
    }
    
    // ==================== НОРМАЛИЗАЦИЯ ТЕЛЕФОНА ====================
    function normalizePhone(phone) {
      if (!phone) return '';
      let normalized = phone.replace(/[^\d+]/g, '');
      if (normalized.startsWith('0')) {
        normalized = '+996' + normalized.substring(1);
      }
      if (!normalized.startsWith('+')) {
        if (normalized.startsWith('996')) {
          normalized = '+' + normalized;
        } else {
          normalized = '+996' + normalized;
        }
      }
      return normalized;
    }
    
    // ==================== ФОРМА ВХОДА ====================
    function showLoginForm() {
      document.getElementById('profileContent').innerHTML = `

        </div>
      `;
    }
    
    // ==================== МОДАЛЬНЫЕ ОКНА ВХОДА/РЕГИСТРАЦИИ ====================

    async function showRegisterModal() {
      const { value: formValues } = await Swal.fire({
        title: '📝 Регистрация',
        html: `
          <input type="text" id="regName" class="swal2-input" placeholder="Ваше имя">
          <input type="tel" id="regPhone" class="swal2-input" placeholder="Номер телефона">

          <input type="password" id="regPassword" class="swal2-input" placeholder="Пароль (мин. 4 символа)">
          <input type="password" id="regPassword2" class="swal2-input" placeholder="Повторите пароль">
        `,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Зарегистрироваться',
        cancelButtonText: 'Отмена',
        confirmButtonColor: '#4CAF50',
        preConfirm: () => {
          const name = document.getElementById('regName').value;
          const phone = document.getElementById('regPhone').value;
          const password = document.getElementById('regPassword').value;
          const password2 = document.getElementById('regPassword2').value;
          
          if (!name || !phone) {
            Swal.showValidationMessage('Заполните имя и телефон');
            return false;
          }
          if (password.length < 4) {
            Swal.showValidationMessage('Пароль должен быть минимум 4 символа');
            return false;
          }
          if (password !== password2) {
            Swal.showValidationMessage('Пароли не совпадают');
            return false;
          }
          
          return {
            name, phone,
            address: document.getElementById('regAddress').value,
            password
          };
        }
      });
      
      if (formValues) {
        await register(formValues);
      }
    }
    
    // ==================== ВХОД ====================
    async function login(phone, password) {
      try {
        Swal.fire({ title: 'Проверка...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        
        const normalizedPhone = normalizePhone(phone);
        const snapshot = await db.collection('customers').where('phone', '==', normalizedPhone).limit(1).get();
        
        if (snapshot.empty) {
          Swal.fire({ icon: 'error', title: 'Клиент не найден', text: 'Проверьте номер или зарегистрируйтесь' });
          return;
        }
        
        const doc = snapshot.docs[0];
        const data = doc.data();
        
        if (data.password !== password) {
          Swal.fire({ icon: 'error', title: 'Неверный пароль' });
          return;
        }
        
        // Проверяем, является ли это админом
        const adminPhone = normalizePhone(ADMIN_CUSTOMER_DATA.phone);
        const isAdminLogin = normalizedPhone === adminPhone && password === ADMIN_CUSTOMER_DATA.password;
        
        currentCustomer = { id: doc.id, ...data, isAdmin: isAdminLogin };
        isAdmin = isAdminLogin;
        _saveProfileData();
        
        Swal.fire({ 
          icon: 'success', 
          title: 'Добро пожаловать!', 
          text: currentCustomer.name + (isAdminLogin ? ' (Администратор)' : ''), 
          timer: 1500, 
          showConfirmButton: false 
        });
        
        await loadDashboard();
        
      } catch (error) {
        console.error(error);
        Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Попробуйте позже' });
      }
    }
    
    // ==================== РЕГИСТРАЦИЯ ====================
    async function register(data) {
      try {
        Swal.fire({ title: 'Регистрация...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        
        const normalizedPhone = normalizePhone(data.phone);
        
        const existing = await db.collection('customers').where('phone', '==', normalizedPhone).limit(1).get();
        if (!existing.empty) {
          Swal.fire({ icon: 'warning', title: 'Телефон занят', text: 'Попробуйте войти' });
          return;
        }
        
        // Проверяем, является ли это админом
        const adminPhone = normalizePhone(ADMIN_CUSTOMER_DATA.phone);
        const isAdminRegister = normalizedPhone === adminPhone && data.password === ADMIN_CUSTOMER_DATA.password;
        
        const ref = await db.collection('customers').add({
          name: data.name,
          phone: normalizedPhone,
          address: data.address || '',
          password: data.password,
          createdAt: Date.now(),
          ordersCount: 0,
          totalSpent: 0,
          isAdmin: isAdminRegister
        });
        
        currentCustomer = {
          id: ref.id,
          name: data.name,
          phone: normalizedPhone,
          address: data.address || '',
          isAdmin: isAdminRegister
        };
        
        isAdmin = isAdminRegister;
        _saveProfileData();
        
        Swal.fire({ 
          icon: 'success', 
          title: '🎉 Регистрация успешна!', 
          text: `Добро пожаловать, ${data.name}!`, 
          timer: 2000, 
          showConfirmButton: false 
        });
        
        await loadDashboard();
        
      } catch (error) {
        console.error(error);
        Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Попробуйте позже' });
      }
    }
    
    // ==================== ЗАГРУЗКА ДАШБОРДА ====================
    async function loadDashboard() {
      let orders = [];
      let stats = { ordersCount: 0, totalSpent: 0 };
      
      try {
        // Нормализуем телефон для поиска
        const userPhone = currentCustomer.phone || '';
        const normalizedPhone = normalizePhone(userPhone);
        
        // Ищем заказы по разным форматам телефона
        const phoneVariants = [userPhone, normalizedPhone];
        if (userPhone.startsWith('0')) {
          phoneVariants.push('+996' + userPhone.substring(1));
        }
        if (normalizedPhone.startsWith('+996')) {
          phoneVariants.push('0' + normalizedPhone.substring(4));
        }
        
        // Убираем дубликаты
        const uniquePhones = [...new Set(phoneVariants.filter(p => p))];
        
        // Запрашиваем заказы по всем вариантам телефона
        for (const phone of uniquePhones) {
          const snapshot = await db.collection('orders').where('phone', '==', phone).limit(50).get();
          snapshot.forEach(doc => {
            // Проверяем, не добавлен ли уже этот заказ
            if (!orders.find(o => o.id === doc.id)) {
              orders.push({ id: doc.id, ...doc.data() });
            }
          });
        }
        
        orders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        stats.ordersCount = orders.length;
        stats.totalSpent = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        
        // Кэшируем данные
        _dashboardCache = { stats, orders };
        sessionStorage.setItem('dashboardCache_' + normalizedPhone, JSON.stringify(_dashboardCache));
        
      } catch(e) { 
        console.error('Ошибка загрузки заказов:', e); 
      }
      
      _customerOrders = orders;
      
      // Рендерим dashboard
      renderDashboard(stats, orders);
    }

    // ==================== ВХОД ДЛЯ АДМИНА ====================
    async function openAdminLogin() {

        confirmButtonColor: '#28a745'
      });
      
      if (password) {

          // Проверяем телефон

          const adminPhone = normalizePhone(ADMIN_CUSTOMER_DATA.phone);
          
          if (userPhone !== adminPhone) {
            Swal.fire({
              icon: 'error',
              title: '❌ Доступ запрещён',
              text: 'Ваш номер телефона не совпадает с номером администратора'
            });
            return;
          }
          
          // Успешный вход
          currentCustomer.isAdmin = true;
          isAdmin = true;
          localStorage.setItem('customerData', JSON.stringify(currentCustomer));
          
          Swal.fire({
            icon: 'success',
            title: '✅ Успешный вход',
            text: 'Вы вошли как администратор!',

            showConfirmButton: false

      if (formValues) {

    // ==================== ВЫХОД ====================
    function logout() {

    // ==================== ОКНО ЗАКАЗОВ ====================
    function openOrdersWindow() {
      const orders = _customerOrders || [];
      
      const statusColors = {
        'Новый': '#2196F3',
        'В обработке': '#FF9800',
        'Доставляется': '#9C27B0',
        'Доставлен': '#4CAF50',
        'Выполнен': '#4CAF50',
        'Отменён': '#f44336'
      };
      
      let html = '';
      if (orders.length === 0) {
        html = `<div class="empty-orders"><div class="empty-orders-icon">📦</div><div>У вас пока нет заказов</div></div>`;
      } else {
        html = orders.map(order => {
          const date = order.time || new Date(order.timestamp).toLocaleDateString('ru-RU');
          const color = statusColors[order.status] || '#666';
          const itemsCount = order.items ? order.items.length : 0;
          
          return `
            <div onclick="showOrderDetails('${order.id}')" style="background:#fff; padding:15px; border-bottom:1px solid #f0f0f0; cursor:pointer;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:14px; font-weight:600; color:#333;">#${order.id.slice(-6).toUpperCase()}</span>
                <span style="font-size:11px; padding:4px 8px; background:${color}; color:white; border-radius:4px;">${order.status || 'Новый'}</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:13px; color:#888;">${date} · ${itemsCount} товар(ов)</div>
                <div style="font-size:15px; font-weight:600; color:#333;">${(order.total || 0).toLocaleString()} сом</div>
              </div>
            </div>
          `;
        }).join('');
      }
      
      document.getElementById('ordersWindowContent').innerHTML = html;
      document.getElementById('ordersWindow').style.display = 'flex';
    }
    
    function closeOrdersWindow() {
      document.getElementById('ordersWindow').style.display = 'none';
    }
    
    // ==================== ДЕТАЛИ ЗАКАЗА ====================
    async function showOrderDetails(orderId) {
      try {
        let order = _customerOrders.find(o => o.id === orderId);
        
        if (!order) {
          const doc = await db.collection('orders').doc(orderId).get();
          if (doc.exists) {
            order = { id: doc.id, ...doc.data() };
          }
        }
        
        if (!order) {
          Swal.fire('Ошибка', 'Заказ не найден', 'error');
          return;
        }
        
        const date = order.time || new Date(order.timestamp).toLocaleDateString('ru-RU');
        const statusColors = {
          'Новый': '#17a2b8',
          'В обработке': '#ffc107',
          'Доставляется': '#007bff',
          'Доставлен': '#28a745',
          'Выполнен': '#28a745',
          'Отменён': '#dc3545'
        };
        const color = statusColors[order.status] || '#666';
        
        let itemsHtml = '';
        if (order.items && order.items.length > 0) {
          itemsHtml = order.items.map(item => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0;">
              <div style="flex:1;">
                <div style="font-weight:500;">${item.title}${item.variant ? ` (${item.variant})` : ''}</div>
                <div style="font-size:12px; color:#666;">${item.qty} × ${item.price} сом</div>
              </div>
              <div style="font-weight:600; color:#333;">${item.qty * item.price} сом</div>
            </div>
          `).join('');
        }
        
        // Кнопки для заказа со статусом "Новый"
        const canEdit = order.status === 'Новый';
        
        Swal.fire({
          title: `Заказ #${orderId.slice(-6).toUpperCase()}`,
          html: `
            <div style="text-align:left;">
              <div style="margin-bottom:15px; padding:10px; background:#f8f9fa; border-radius:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span style="color:#666;">Статус:</span>
                  <span style="padding:4px 12px; background:${color}; color:white; border-radius:12px; font-size:13px;">${order.status || 'Новый'}</span>
                </div>
                <div style="margin-top:8px; color:#666; font-size:13px;">📅 ${date}</div>
                <div style="margin-top:5px; color:#666; font-size:13px;">📍 ${order.address || 'Не указан'}</div>
              </div>
              
              <div style="font-weight:600; margin-bottom:10px;">Товары:</div>
              <div style="max-height:200px; overflow-y:auto;">
                ${itemsHtml}
              </div>
              
              <div style="margin-top:15px; padding-top:15px; border-top:2px solid #4CAF50; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:16px; font-weight:600;">Итого:</span>
                <span style="font-size:20px; font-weight:700; color:#4CAF50;">${(order.total || 0).toLocaleString()} сом</span>
              </div>
              
              ${canEdit ? `
              <div style="margin-top:15px; display:flex; gap:10px;">
                <button onclick="editOrder('${orderId}')" style="flex:1; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">✏️ Редактировать</button>
              </div>
              ` : ''}
            </div>
          `,
          confirmButtonText: 'Закрыть',
          confirmButtonColor: '#4CAF50',
          showCancelButton: canEdit,
          cancelButtonText: '❌ Отменить заказ',
          cancelButtonColor: '#dc3545'
        }).then(async (result) => {
          if (result.dismiss === Swal.DismissReason.cancel && order.status === 'Новый') {
            const confirm = await Swal.fire({
              title: 'Отменить заказ?',
              text: 'Это действие нельзя отменить',
              icon: 'warning',
              showCancelButton: true,
              confirmButtonText: 'Да, отменить',
              cancelButtonText: 'Нет',
              confirmButtonColor: '#dc3545',
              position: 'top'
            });
            
            if (confirm.isConfirmed) {
              try {
                await db.collection('orders').doc(orderId).update({ status: 'cancelled' });
                Swal.fire('Заказ отменён', '', 'success');
                await loadDashboard();
              } catch (e) {
                Swal.fire('Ошибка', 'Не удалось отменить заказ', 'error');
              }
            }
          }
        });
        
      } catch (error) {
        console.error('Ошибка загрузки заказа:', error);
        Swal.fire('Ошибка', 'Не удалось загрузить детали заказа', 'error');
      }
    }
    
    // ==================== РЕДАКТИРОВАНИЕ ЗАКАЗА ====================
    let _editingOrder = null;
    
    async function editOrder(orderId) {
      Swal.close();
      
      let order = _customerOrders.find(o => o.id === orderId);
      if (!order) {
        const doc = await db.collection('orders').doc(orderId).get();
        if (doc.exists) {
          order = { id: doc.id, ...doc.data() };
        }
      }
      
      if (!order || order.status !== 'Новый') {
        Swal.fire('Ошибка', 'Заказ нельзя редактировать', 'error');
        return;
      }
      
      _editingOrder = JSON.parse(JSON.stringify(order));
      
      showEditOrderWindow();
    }
    
    function showEditOrderWindow() {
      if (!_editingOrder) return;
      
      let itemsHtml = _editingOrder.items.map((item, index) => `
        <div style="display:flex; align-items:center; gap:10px; padding:12px; background:#fff; border-radius:8px; margin-bottom:10px; border:1px solid #e0e0e0;">
          <div style="flex:1;">
            <div style="font-weight:600; font-size:14px;">${item.title}${item.variant ? ` (${item.variant})` : ''}</div>
            <div style="font-size:13px; color:#666;">${item.price} сом/шт</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <button onclick="changeEditQty(${index}, -1)" style="width:32px; height:32px; background:#f0f0f0; border:none; border-radius:6px; cursor:pointer; font-size:18px;">−</button>
            <span id="editQty${index}" style="min-width:30px; text-align:center; font-weight:600;">${item.qty}</span>
            <button onclick="changeEditQty(${index}, 1)" style="width:32px; height:32px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer; font-size:18px;">+</button>
          </div>
          <button onclick="removeEditItem(${index})" style="width:32px; height:32px; background:#dc3545; color:white; border:none; border-radius:6px; cursor:pointer;">✕</button>
        </div>
      `).join('');
      
      const total = _editingOrder.items.reduce((sum, item) => sum + (item.qty * item.price), 0);
      
      const html = `
        <div style="height:100%; display:flex; flex-direction:column;">
          <div class="modal-header">
            <div style="display:flex; align-items:center; gap:10px;">
              <button onclick="closeEditOrderWindow()" style="background:none; border:none; color:#333; font-size:20px; cursor:pointer;">←</button>
              <div class="modal-title">✏️ Редактирование заказа #${_editingOrder.id.slice(-6).toUpperCase()}</div>
            </div>
          </div>
          
          <div style="flex:1; overflow-y:auto; padding:15px; background:#f5f5f5;">
            <div style="margin-bottom:15px;">
              <label style="display:block; font-weight:600; margin-bottom:8px; color:#333;">📍 Адрес доставки:</label>
              <input type="text" id="editOrderAddress" value="${_editingOrder.address || ''}" placeholder="Введите адрес" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:15px;">
            </div>
            
            <div style="font-weight:600; margin-bottom:10px; color:#333;">🛒 Товары:</div>
            <div id="editOrderItems">
              ${itemsHtml}
            </div>
            
            ${_editingOrder.items.length === 0 ? '<div style="text-align:center; padding:20px; color:#999;">Добавьте товары в заказ</div>' : ''}
          </div>
          
          <div style="padding:15px; background:#fff; border-top:1px solid #e0e0e0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <span style="font-size:16px; font-weight:600;">Итого:</span>
              <span id="editOrderTotal" style="font-size:20px; font-weight:700; color:#4CAF50;">${total.toLocaleString()} сом</span>
            </div>
            <button onclick="saveEditedOrder()" style="width:100%; padding:14px; background:linear-gradient(90deg, #4CAF50, #2e7d32); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:16px;">💾 Сохранить изменения</button>
          </div>
        </div>
      `;
      
      document.getElementById('editOrderWindow').innerHTML = html;
      document.getElementById('editOrderWindow').style.display = 'flex';
    }
    
    function changeEditQty(index, delta) {
      if (!_editingOrder || !_editingOrder.items[index]) return;
      
      const newQty = _editingOrder.items[index].qty + delta;
      if (newQty < 1) {
        removeEditItem(index);
        return;
      }
      
      _editingOrder.items[index].qty = newQty;
      document.getElementById(`editQty${index}`).textContent = newQty;
      updateEditTotal();
    }
    
    function removeEditItem(index) {
      if (!_editingOrder) return;
      
      _editingOrder.items.splice(index, 1);
      showEditOrderWindow();
    }
    
    function updateEditTotal() {
      if (!_editingOrder) return;
      const total = _editingOrder.items.reduce((sum, item) => sum + (item.qty * item.price), 0);
      const totalEl = document.getElementById('editOrderTotal');
      if (totalEl) totalEl.textContent = total.toLocaleString() + ' сом';
    }
    
    function closeEditOrderWindow() {
      document.getElementById('editOrderWindow').style.display = 'none';
      _editingOrder = null;
    }
    
    async function saveEditedOrder() {
      if (!_editingOrder) return;
      
      if (_editingOrder.items.length === 0) {
        Swal.fire('Ошибка', 'Добавьте хотя бы один товар', 'error');
        return;

    // Загрузка изображения для PDF
    function loadImageForPdf(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
        img.src = url;
      });
    }

            icon: 'success',
            title: 'Предложение отправлено!',
            text: 'Спасибо! Мы рассмотрим ваше предложение.'
          });
        } else {
          throw new Error('Ошибка отправки');
        }
      } catch (error) {
        console.error('Ошибка:', error);
        document.getElementById('suggestionLoader').style.display = 'none';
        document.getElementById('suggestionSubmitBtn').disabled = false;
        Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Не удалось отправить. Попробуйте позже.' });
      }
    }
    
    // ==================== СТАТЬ ПРОДАВЦОМ ====================
    function openBecomeSellerWindow() {
      document.getElementById('becomeSellerWindow').style.display = 'flex';
      switchSellerTab('register');
      
      // Очистка форм
      document.getElementById('sellerName').value = '';
      document.getElementById('sellerPhone').value = '';
      document.getElementById('sellerPassword').value = '';
      document.getElementById('sellerCity').value = '';
      document.getElementById('sellerProducts').value = '';
      document.getElementById('sellerTelegramId').value = '';
      document.getElementById('sellerLoginPhone').value = '';
      document.getElementById('sellerLoginPassword').value = '';
    }
    
    function closeBecomeSellerWindow() {
      document.getElementById('becomeSellerWindow').style.display = 'none';
    }
    
    function switchSellerTab(tab) {
      const registerTab = document.getElementById('sellerTabRegister');
      const loginTab = document.getElementById('sellerTabLogin');
      const registerForm = document.getElementById('sellerRegisterForm');
      const loginForm = document.getElementById('sellerLoginForm');
      
      if (tab === 'register') {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
      } else {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      }
    }
    
    async function registerSeller() {
      const name = document.getElementById('sellerName').value.trim();
      const phone = document.getElementById('sellerPhone').value.trim();
      const password = document.getElementById('sellerPassword').value.trim();
      const city = document.getElementById('sellerCity').value.trim();
      const products = document.getElementById('sellerProducts').value.trim();
      const telegramId = document.getElementById('sellerTelegramId').value.trim();
      
      if (!name) { Swal.fire('Ошибка', 'Введите имя или название компании', 'error'); return; }
      if (!phone) { Swal.fire('Ошибка', 'Введите телефон', 'error'); return; }
      if (!password || password.length < 4) { Swal.fire('Ошибка', 'Пароль минимум 4 символа', 'error'); return; }
      if (!city) { Swal.fire('Ошибка', 'Укажите город', 'error'); return; }
      
      try {
        document.getElementById('sellerLoader').style.display = 'flex';
        document.getElementById('sellerSubmitBtn').disabled = true;
        
        // Проверяем, не занят ли телефон
        const existing = await db.collection('sellers').where('phone', '==', phone).get();
        if (!existing.empty) {
          document.getElementById('sellerLoader').style.display = 'none';
          document.getElementById('sellerSubmitBtn').disabled = false;
          Swal.fire('Ошибка', 'Этот телефон уже зарегистрирован. Используйте вход.', 'error');
          return;
        }
        
        // Регистрация продавца
        await db.collection('sellers').add({
          name,
          phone,
          password,
          city,
          products,
          telegramId: telegramId || '',
          status: 'pending',
          createdAt: Date.now()
        });
        
        // Уведомление в Telegram
        const message = `🏪 *НОВЫЙ ПРОДАВЕЦ*\n\n` +
          `👤 *Имя:* ${name}\n` +
          `📱 *Телефон:* ${phone}\n` +
          `🏙️ *Город:* ${city}\n` +
          `📦 *Товары:* ${products || 'не указаны'}\n` +
          `📱 *Telegram ID:* ${telegramId || 'не указан'}\n\n` +
          `🕐 *Дата:* ${new Date().toLocaleString('ru-RU')}`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message,
            parse_mode: 'Markdown'
          })
        });
        
        document.getElementById('sellerLoader').style.display = 'none';
        document.getElementById('sellerSubmitBtn').disabled = false;
        
        closeBecomeSellerWindow();
        Swal.fire({
          icon: 'success',
          title: 'Заявка отправлена!',
          html: `<p>Ваша заявка на регистрацию продавца отправлена.</p>
                 <p style="color:#666;">Мы свяжемся с вами после проверки.</p>`
        });
        
      } catch (error) {
        console.error('Ошибка:', error);
        document.getElementById('sellerLoader').style.display = 'none';
        document.getElementById('sellerSubmitBtn').disabled = false;
        Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Не удалось отправить заявку' });
      }
    }
    
    async function loginSeller() {
      const phone = document.getElementById('sellerLoginPhone').value.trim();
      const password = document.getElementById('sellerLoginPassword').value.trim();
      
      if (!phone || !password) {
        Swal.fire('Ошибка', 'Введите телефон и пароль', 'error');
        return;
      }
      
      try {
        document.getElementById('sellerLoader').style.display = 'flex';
        
        const snapshot = await db.collection('sellers').where('phone', '==', phone).limit(1).get();
        
        if (snapshot.empty) {
          document.getElementById('sellerLoader').style.display = 'none';
          Swal.fire('Ошибка', 'Продавец не найден', 'error');
          return;
        }
        
        const doc = snapshot.docs[0];
        const data = doc.data();
        
        if (data.password !== password) {
          document.getElementById('sellerLoader').style.display = 'none';
          Swal.fire('Ошибка', 'Неверный пароль', 'error');
          return;
        }
        
        if (data.status === 'blocked') {
          document.getElementById('sellerLoader').style.display = 'none';
          Swal.fire({
            icon: 'error',
            title: '🚫 Доступ запрещён',
            text: 'Ваш аккаунт заблокирован администратором. Обратитесь в поддержку.',
            confirmButtonText: 'Понятно'
          });
          return;
        }
        
        if (data.status === 'pending') {
          document.getElementById('sellerLoader').style.display = 'none';
          Swal.fire({
            icon: 'info',
            title: '⏳ Заявка на рассмотрении',
            text: 'Ваша заявка ещё не одобрена администратором. Дождитесь проверки.',
            confirmButtonText: 'Понятно'
          });
          return;
        }
        
        // Успешный вход
        const sellerData = { id: doc.id, ...data };
        localStorage.setItem('currentSeller', JSON.stringify(sellerData));
        
        document.getElementById('sellerLoader').style.display = 'none';
        closeBecomeSellerWindow();
        
        Swal.fire({
          icon: 'success',
          title: `Добро пожаловать, ${data.name}!`,
          text: 'Вы вошли как продавец. Теперь вы можете добавлять товары.',
          timer: 2000,
          showConfirmButton: false
        }).then(() => {
          // Перерисовываем dashboard — появится панель продавца
          loadDashboard();
        });
        
      } catch (error) {
        console.error('Ошибка:', error);
        document.getElementById('sellerLoader').style.display = 'none';
        Swal.fire({ icon: 'error', title: 'Ошибка', text: 'Попробуйте позже' });
      }
    }
    
    // ==================== ОБНОВЛЕНИЕ БЕЙДЖА КОРЗИНЫ ====================
    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const badge = document.getElementById('navCartBadge');
      if (badge) {
        badge.textContent = cart.length;
        badge.style.display = cart.length > 0 ? 'flex' : 'none';
      }
    }
    
    // ==================== ЗАПУСК ====================
    document.addEventListener('DOMContentLoaded', init);
    
    // Обновляем бейдж при изменении корзины
    window.addEventListener('storage', (e) => {
      if (e.key === 'cart') updateCartBadge();
    });
  </script>
